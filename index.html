<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Achkid - المنيو</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        h1 { color: #d9534f; }
        .menu-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; padding: 15px; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        h3 { margin: 15px 0 5px; color: #333; }
    </style>
</head>
<body>

    <h1>قائمة مأكولات Snack Achkid</h1>
    <p>مرحباً بكم في مطعمكم بمراكش</p>

    <div class="menu-grid">
        <div class="card">
            <img src="tajine.jpg" alt="طاجين">
            <h3>طاجين مغربي</h3>
        </div>
        <div class="card">
            <img src="tacos.jpg" alt="تاكوس">
            <h3>تاكوس</h3>
        </div>
        <div class="card">
            <img src="shawarma.jpg" alt="شاورما">
            <h3>شاورما</h3>
        </div>
        <div class="card">
            <img src="bocadillos.jpg" alt="بوكاديوس">
            <h3>بوكاديوس</h3>
        </div>
        <div class="card">
            <img src="sandwich.jpg" alt="ساندوتش">
            <h3>ساندوتش</h3>
        </div>
    </div>

</body>
</html>
